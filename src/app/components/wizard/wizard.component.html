<div class="wizard-container">
  <!-- Progress Indicator -->
  <div class="wizard-progress" *ngIf="currentStep > 3 && currentStep <= totalSteps">
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="((currentStep - 3) / 6) * 100"></div>
    </div>
    <div class="progress-steps">
      <span class="step-indicator">{{ currentStep - 3 }} / 6</span>
    </div>
  </div>

  <!-- Step Content -->
  <div class="wizard-content">
    <ng-container [ngSwitch]="currentStep">
      <!-- Flujo inicial: Posición Global, Contratar, Préstamos -->
      <app-posicion-global *ngSwitchCase="1" (next)="nextStep()" (goToPotencialFinanciero)="goToStep(4)"></app-posicion-global>
      <app-contratar *ngSwitchCase="2" (next)="nextStep()" (previous)="previousStep()"></app-contratar>
      <app-prestamos *ngSwitchCase="3" (next)="nextStep()" (previous)="previousStep()"></app-prestamos>
      
      <!-- Flujo MVP: Tu Potencial Financiero -->
      <app-landing *ngSwitchCase="4" (next)="nextStep()" (previous)="previousStep()"></app-landing>
      <app-perfil-financiero *ngSwitchCase="5" (next)="nextStep()" (previous)="previousStep()"></app-perfil-financiero>
      <app-capacidad-financiacion *ngSwitchCase="6" (next)="nextStep()" (previous)="previousStep()"></app-capacidad-financiacion>
      <app-recomendaciones-productos *ngSwitchCase="7" (next)="nextStep()" (previous)="previousStep()"></app-recomendaciones-productos>
      <app-establecer-meta *ngSwitchCase="8" (next)="nextStep()" (previous)="previousStep()"></app-establecer-meta>
      <app-resumen *ngSwitchCase="9" (previous)="previousStep()"></app-resumen>
    </ng-container>
  </div>
</div>
